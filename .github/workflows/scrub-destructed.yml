name: Scrub Destructed Memories

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  scrub:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call scrub endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          BASE_URL: ${{ secrets.BASE_URL }}
        run: |
          if [ -z "$BASE_URL" ]; then
            BASE_URL="https://www.ifonlyisentthis.com"
          fi
          if [ -z "$CRON_SECRET" ]; then
            echo "Missing CRON_SECRET repo secret" >&2
            exit 1
          fi
          curl -sS -X POST "$BASE_URL/api/cron/scrub-destructed" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -H "User-Agent: ifonlyisentthis-cron/1.0" \
            --fail
